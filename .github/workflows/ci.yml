name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Python lint (syntax only)
        run: python3 -m py_compile scripts/api_server.py

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Build frontend
        run: npm run build
